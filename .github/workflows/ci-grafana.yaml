name: CI Build Grafana-OSS
on:
  push:
    branches: ['main']
    paths-ignore:
      - '.github/workflows/**'
  schedule:
    - cron: '0 0 7 * *'
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  BASE_IMAGE: alpine
jobs:
  prepare:
    name: Parse ARGs
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      os_name: ${{ steps.parse.outputs.os_name }}
      os_vers: ${{ steps.parse.outputs.os_vers }}
      au_name: ${{ steps.parse.outputs.au_name }}
      au_vers: ${{ steps.parse.outputs.au_vers }}
      go_vers: ${{ steps.parse.outputs.go_vers }}
      nd_vers: ${{ steps.parse.outputs.nd_vers }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Parse ARGs from Repository
        id: parse
        shell: bash
        run: |
          command -v bash || exit 1;
          if [ ! -f "Dockerfile" ]; then
            echo "Error: No such file or directory"
            exit 1
          fi
          OS_NAME=$(grep -E '^FROM\sgolang:' Dockerfile | head -n 1 | sed 's/^FROM\sgolang:\(.*\)-\(.*\)\sAS\(.*\)/\2/'| sed 's/[^a-zA-Z]//g' | sed 's/^[[:space:]"]*//;s/[[:space:]"]*$//')
          OS_VERS=$(grep -E '^FROM\sgolang:' Dockerfile | head -n 1 | sed 's/^FROM\sgolang:\(.*\)-\(.*\)\sAS\(.*\)/\2/'| sed 's/[^0-9.]//g' | sed 's/^[[:space:]"]*//;s/[[:space:]"]*$//')
          AU_NAME=$(grep -E '^WORKDIR\s/tmp/' Dockerfile | head -n 1 | awk -F '/' '{print $3}' | sed 's/^[[:space:]"]*//;s/[[:space:]"]*$//')
          AU_VERS=$(grep -E '^ENV\sVERSION=' Dockerfile | tail -n 1 | sed 's/^ENV\sVERSION=\(.*\)/\1/' | sed 's/^[[:space:]"]*//;s/[[:space:]"]*$//' | sed 's/+/-/g')
          # check if values are empty
          if [ -z "$OS_NAME" ] || [ -z "$OS_VERS" ] || [ -z "$AU_NAME" ] || [ -z "$AU_VERS" ]; then
            echo "Error: One or more ARG values are empty"
            exit 1
          fi
          GO_VERS=$(grep -E '^FROM\sgolang:' Dockerfile | head -n 1 |  sed 's/^FROM\sgolang:\(.*\)-\(.*\)AS\(.*\)/\1/' | sed 's/^[[:space:]"]*//;s/[[:space:]"]*$//')
          ND_VERS=$(grep -E '^FROM\snode:' Dockerfile | head -n 1 |  sed 's/^FROM\snode:\(.*\)-\(.*\)AS\(.*\)/\1/' | sed 's/^[[:space:]"]*//;s/[[:space:]"]*$//')
          if [ -z "$GO_VERS" ] || [ -z "$ND_VERS" ]; then
            echo "Error: One or more ARG values are empty"
            exit 1
          fi
          # echo results
          echo "OS: '${OS_NAME}'-'${OS_VERS}'"
          echo "AU: '${AU_NAME}'-'${AU_VERS}'"
          echo "GO: '${GO_VERS}'"
          echo "NODE: '${ND_VERS}'"
          # set outputs
          echo "os_name=${OS_NAME}" >> $GITHUB_OUTPUT
          echo "os_vers=${OS_VERS}" >> $GITHUB_OUTPUT
          echo "au_name=${AU_NAME}" >> $GITHUB_OUTPUT
          echo "au_vers=${AU_VERS}" >> $GITHUB_OUTPUT
          echo "go_vers=${GO_VERS}" >> $GITHUB_OUTPUT
          echo "nd_vers=${ND_VERS}" >> $GITHUB_OUTPUT
  build:
    name: Build and Push (${{ matrix.arch }})
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: linux/amd64
            runs-on: ubuntu-24.04
          - arch: linux/arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Normalize Architectures Tags
        id: normalize
        run: |
          ARCH_TAG=$(echo "${{ matrix.arch }}" | xargs basename | tr -d '[:space:]')
          echo "${ARCH_TAG}"
          echo "arch_tag=${ARCH_TAG}" >> $GITHUB_OUTPUT
      - name: Build and Push Image (${{ matrix.arch }})
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ needs.prepare.outputs.au_name }}:${{ steps.normalize.outputs.arch_tag }}
  merge:
    name: Create and Push Multi-Arch Manifest
    runs-on: ubuntu-24.04
    needs: 
      - prepare
      - build
    permissions:
      packages: write
    steps:
      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and Push Manifest linux/amd64, linux/arm64
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ needs.prepare.outputs.au_name }}:${{ needs.prepare.outputs.au_vers }}-${{ env.BASE_IMAGE }}${{ needs.prepare.outputs.os_vers }} \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ needs.prepare.outputs.au_name }}:amd64 \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ needs.prepare.outputs.au_name }}:arm64
  cleanup:
    name: Cleanup Obsoleting Tags
    runs-on: ubuntu-slim
    needs: 
      - prepare
      - build
      - merge
    permissions:
      packages: write
    steps:
      - name: Delete Intermediate Tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=${{ github.repository_owner }}
          IMAGE=${{ needs.prepare.outputs.au_name }}
          for TAG in amd64 arm64; do
            VERSION_ID=$(gh api -H "Accept: application/vnd.github+json" \
              /users/$OWNER/packages/container/$IMAGE/versions \
              --jq ".[] | select(.metadata.container.tags[]? == \"$TAG\") | .id")
            if [ -n "$VERSION_ID" ]; then
              echo "Deleting $IMAGE:$TAG (version id $VERSION_ID)"
              gh api \
                --method DELETE \
                -H "Accept: application/vnd.github+json" \
                /users/$OWNER/packages/container/$IMAGE/versions/$VERSION_ID
            fi
          done
      - name: Cleanup Untagged Images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          delete-untagged: true
          owner: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          package: ${{ needs.prepare.outputs.au_name }}